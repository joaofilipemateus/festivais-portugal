    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #FFFFFF;
            overflow: hidden;
        }
        /* Scrollbar Spotify Style */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #282828; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3e3e3e; }
        
        .leaflet-container { background: #121212 !important; }
        
        /* Glassmorphism popups */
        .leaflet-popup-content-wrapper {
            background: rgba(30, 30, 30, 0.95) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important;
        }
        .leaflet-popup-tip { background: rgba(30, 30, 30, 0.95) !important; }
        
        .custom-cluster {
            background: rgba(29, 185, 84, 0.2);
            border: 2px solid #1DB954;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 0 15px #1DB954;
            transition: transform 0.2s ease;
        }
        
        .festival-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .festival-card.active-card {
            border-color: #1DB954 !important;
            background: rgba(29, 185, 84, 0.1) !important;
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.1);
        }

        /* Popup ampliado para acomodar logótipo, artistas e viagem */
        .leaflet-popup-content { margin: 12px !important; width: 300px !important; }

        .festival-logo {
            width: 60px; height: 60px; min-width: 60px;
            border-radius: 10px; object-fit: cover;
            background: #282828; border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .festival-logo-placeholder {
            width: 60px; height: 60px; min-width: 60px;
            border-radius: 10px; background: #282828;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            color: #555; font-size: 20px; flex-shrink: 0;
        }

        .artist-tag-list {
            max-height: 88px; overflow-y: auto;
            display: flex; flex-wrap: wrap; gap: 4px;
        }
        .artist-tag {
            background: rgba(29, 185, 84, 0.12);
            border: 1px solid rgba(29, 185, 84, 0.35);
            color: #d6f5e1;
            font-size: 10px; line-height: 1.4;
            padding: 2px 7px; border-radius: 999px;
            white-space: nowrap;
        }

        .viagem-toggle {
            width: 100%; text-align: left;
            display: flex; align-items: center; justify-content: space-between;
            background: #1E1E1E; border: 1px solid #333;
            border-radius: 8px; padding: 7px 10px;
            color: #fff; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: background 0.2s ease;
        }
        .viagem-toggle:hover { background: #252525; }
        .viagem-toggle .chevron { transition: transform 0.2s ease; }
        .viagem-toggle.open .chevron { transform: rotate(180deg); }

        .viagem-panel { display: none; margin-top: 8px; }
        .viagem-panel.open { display: block; }

        .viagem-table { width: 100%; font-size: 11px; border-collapse: collapse; }
        .viagem-table th {
            text-align: left; color: #888; font-weight: 600;
            padding: 4px 6px; border-bottom: 1px solid #333;
            text-transform: uppercase; font-size: 9px; letter-spacing: 0.5px;
        }
        .viagem-table td { padding: 6px 6px; border-bottom: 1px solid #282828; color: #eee; }
        .viagem-table tr:last-child td { border-bottom: none; }

        .portagem-input {
            width: 100%; background: #121212; border: 1px solid #333;
            border-radius: 6px; padding: 5px 8px; font-size: 11px;
            color: #fff; margin-top: 6px;
        }
        .portagem-input:focus { outline: none; border-color: #1DB954; }

        .viagem-spinner {
            display: inline-block; width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.2); border-top-color: #1DB954;
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    </header>

                </div>
            </div>

            <hr class="border-zinc-800">

            <!-- NOVO: Filtro por Datas / Fins de Semana -->
            <div class="bg-[#121212] p-4 rounded-xl border border-zinc-800 shadow-inner">
                <label class="text-xs font-bold uppercase text-white tracking-wider flex items-center gap-2 mb-3">
                    <i class="fa-solid fa-calendar-days text-[#1DB954]"></i> Período do Evento
                </label>
                <p class="text-[11px] text-[#B3B3B3] mb-3 leading-relaxed">Seleciona as datas para encontrares festivais que ocorram nesse fim de semana ou intervalo.</p>
                
                <div class="flex flex-col gap-3">
                    <div>
                        <label class="text-[10px] text-zinc-500 uppercase block mb-1">A partir de:</label>
                        <input type="date" id="date-start" class="w-full bg-[#1E1E1E] border border-zinc-700 rounded p-2 text-xs text-white focus:outline-none focus:border-[#1DB954]" style="color-scheme: dark;">
                    </div>
                    <div>
                        <label class="text-[10px] text-zinc-500 uppercase block mb-1">Até:</label>
                        <input type="date" id="date-end" class="w-full bg-[#1E1E1E] border border-zinc-700 rounded p-2 text-xs text-white focus:outline-none focus:border-[#1DB954]" style="color-scheme: dark;">
                    </div>
                    <button id="clear-dates" class="mt-1 text-[11px] text-[#1DB954] hover:text-white transition-colors text-right">
                        Limpar datas
                    </button>
                </div>
            </div>

            <!-- Filtros Estruturados -->
            <div class="flex flex-col gap-4">
                <div>
                    <label class="text-xs font-semibold uppercase text-[#B3B3B3] tracking-widest block mb-2">Distrito</label>
                    <select id="filter-distrito" class="w-full bg-[#121212] border border-zinc-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#1DB954]">
                        <option value="">Todos os Distritos</option>
                    </select>
                </div>
            </div>

            <hr class="border-zinc-800">

            <!-- Geofence Salvaterra -->
            <div class="bg-[#121212] p-4 rounded-xl border border-zinc-800 shadow-inner">
                <div class="flex items-center justify-between mb-3">
                    <label class="text-xs font-bold uppercase text-white tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-location-crosshairs text-[#1DB954]"></i> Proximidade
                    </label>
                    <input type="checkbox" id="geo-toggle" class="w-4 h-4 accent-[#1DB954] cursor-pointer">
                </div>
                <p class="text-[11px] text-[#B3B3B3] mb-3 leading-relaxed">Raio a partir de <strong>Salvaterra de Magos</strong>.</p>
                <div class="opacity-40 pointer-events-none transition-opacity" id="geo-slider-wrapper">

                    <div class="flex justify-between items-center mt-2 text-xs text-[#B3B3B3]">
                        <span>Até:</span>
                        <span class="font-bold text-white" id="geo-val">100 km</span>
                    </div>
                </div>
            </div>
        </aside>

<main id="painel-mapa" class="w-full h-[400px] lg:flex-1 lg:h-full relative">

</main>

        let map, markerClusterGroup;

        function initApp() {
            map = L.map('map', { center: [39.5, -8.2], zoom: 7, zoomControl: false });
            L.control.zoom({ position: 'bottomleft' }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO', subdomains: 'abcd', maxZoom: 20
            }).addTo(map);

            markerClusterGroup = L.markerClusterGroup({
                showCoverageOnHover: false,
                iconCreateFunction: function(cluster) {
                    return L.divIcon({
                        html: `<span>${cluster.getChildCount()}</span>`,
                        className: 'custom-cluster', iconSize: L.point(40, 40)
                    });
                }
            });
            map.addLayer(markerClusterGroup);

            populateDistritosFilter();
            
            // Listeners
            document.getElementById('search-input').addEventListener('input', updateInterface);
            document.getElementById('filter-distrito').addEventListener('change', updateInterface);
            
            // Date Listeners
            document.getElementById('date-start').addEventListener('change', updateInterface);
            document.getElementById('date-end').addEventListener('change', updateInterface);
            document.getElementById('clear-dates').addEventListener('click', () => {
                document.getElementById('date-start').value = '';
                document.getElementById('date-end').value = '';
                updateInterface();
            });

            // Geo Listeners
            document.getElementById('geo-toggle').addEventListener('change', function() {
                const wrapper = document.getElementById('geo-slider-wrapper');
                if (this.checked) wrapper.classList.remove('opacity-40', 'pointer-events-none');
                else wrapper.classList.add('opacity-40', 'pointer-events-none');
                updateInterface();
            });
            document.getElementById('geo-slider').addEventListener('input', function() {
                document.getElementById('geo-val').innerText = `${this.value} km`;
                updateInterface();
            });

            // Ordenar base de dados por data (mais recentes primeiro)
            databaseFestivais.sort((a, b) => new Date(a.dataInicio) - new Date(b.dataInicio));

            updateInterface();
        }

        function populateDistritosFilter() {
            const distritoSelect = document.getElementById('filter-distrito');
            const distritosunicos = [...new Set(databaseFestivais.map(f => f.distrito))].sort();
            distritosunicos.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d; opt.innerText = d;
                distritoSelect.appendChild(opt);
            });
        }

        function calculateHaversine(coords1, coords2) {
            const [lat1, lon1] = coords1; const [lat2, lon2] = coords2;
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // Nova função para formatar o intervalo de datas inteligentemente
        function formatarDataDupla(inicio, fim) {
            const opcDiaMes = { day: 'numeric', month: 'short' };
            const ano = new Date(fim).getFullYear();
            const strInicio = new Date(inicio).toLocaleDateString('pt-PT', opcDiaMes);
            const strFim = new Date(fim).toLocaleDateString('pt-PT', opcDiaMes);
            
            if (inicio === fim) return `${strInicio}, ${ano}`;
            return `${strInicio} a ${strFim}, ${ano}`;
        }

        function updateInterface() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const selectedDistrito = document.getElementById('filter-distrito').value;
            
            const filterStartStr = document.getElementById('date-start').value;
            const filterEndStr = document.getElementById('date-end').value;
            const filterStart = filterStartStr ? new Date(filterStartStr) : null;
            const filterEnd = filterEndStr ? new Date(filterEndStr) : null;

            const geoActive = document.getElementById('geo-toggle').checked;
            const geoRaio = parseFloat(document.getElementById('geo-slider').value);

            const filtered = databaseFestivais.filter(fest => {
                const matchesSearch = fest.nome.toLowerCase().includes(searchTerm) || fest.cidade.toLowerCase().includes(searchTerm);
                const matchesDistrito = selectedDistrito === "" || fest.distrito === selectedDistrito;
                
                // Lógica de interceção de datas para o novo Filtro de Fim de Semana/Período
                let matchesDate = true;
                const festStart = new Date(fest.dataInicio);
                const festEnd = new Date(fest.dataFim);
                
                if (filterStart && filterEnd) {
                    matchesDate = (festEnd >= filterStart && festStart <= filterEnd);
                } else if (filterStart) {
                    matchesDate = (festEnd >= filterStart);
                } else if (filterEnd) {
                    matchesDate = (festStart <= filterEnd);
                }

                let matchesGeo = true;
                if (geoActive) {
                    matchesGeo = calculateHaversine(SALVATERRA_COORDS, fest.coords) <= geoRaio;
                }

                return matchesSearch && matchesDistrito && matchesDate && matchesGeo;
            });

            document.getElementById('counter-total').innerText = filtered.length;
            renderPinsOnMap(filtered);
            renderListCards(filtered);
        }

        function renderPinsOnMap(data) {

                className: '', iconSize: [16, 16]
            });

            data.forEach(fest => {
                const marker = L.marker(fest.coords, { icon: customIcon });
                marker.bindPopup(buildPopupHtml(fest), { maxWidth: 320, minWidth: 280 });
                marker.on('click', () => highlightCardInList(fest.id));

                markerClusterGroup.addLayer(marker);
                markersMap[fest.id] = marker;
            });
        }

        // Constrói o HTML do popup: logótipo + detalhes, lista de artistas, separador Viagem

                instagramHtml = `

                       class="w-full text-center bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-700 hover:to-pink-600 text-white font-medium py-1.5 px-3 rounded-lg text-xs flex items-center justify-center gap-2 transition-colors">
                       <i class="fa-brands fa-instagram"></i> Instagram Oficial
                    </a>
                `;
            }

            // --- Separador "Viagem" (OSRM, calculado on-demand) ---
            const viagemHtml = `
                <div class="mt-3">
                    <button type="button" class="viagem-toggle" id="viagem-toggle-${fest.id}" onclick="toggleViagemPanel(${fest.id})">

            return `
                <div class="p-2" style="width: 280px;">
                    <div class="flex items-start gap-3">

                            <p class="text-[11px] text-zinc-400">📅 ${formatarDataDupla(fest.dataInicio, fest.dataFim)}</p>

                    ${artistasHtml}

        // Guarda os valores de portagem inseridos manualmente, em memória (id -> valor)
        const portagensManual = {};
        // Cache de rotas OSRM já calculadas, para não repetir chamadas (id -> { autoestrada, nacional })
        const rotasCache = {};

        function toggleViagemPanel(id) {
            const toggleBtn = document.getElementById(`viagem-toggle-${id}`);
            const panel = document.getElementById(`viagem-panel-${id}`);
            const isOpen = panel.classList.contains('open');

            if (isOpen) {
                panel.classList.remove('open');
                toggleBtn.classList.remove('open');
                return;
            }

            panel.classList.add('open');
            toggleBtn.classList.add('open');

            if (rotasCache[id]) {
                renderRotaResultado(id, rotasCache[id]);
            } else {
                calcularRotaOSRM(id);
            }
        }

        // Calcula a rota Salvaterra de Magos -> festival via OSRM (Autoestrada vs Estradas Nacionais)
        async function calcularRotaOSRM(id) {
            const fest = databaseFestivais.find(f => f.id === id);
            if (!fest) return;

            const origem = SALVATERRA_COORDS; // [lat, lon]
            const destino = fest.coords;
            const coordStr = `${origem[1]},${origem[0]};${destino[1]},${destino[0]}`;
            const base = 'https://router.project-osrm.org/route/v1/driving/';

            try {
                const [resAuto, resNac] = await Promise.all([
                    fetch(`${base}${coordStr}?overview=false`),
                    fetch(`${base}${coordStr}?overview=false&exclude=motorway`)
                ]);
                const [dataAuto, dataNac] = await Promise.all([resAuto.json(), resNac.json()]);

                const autoestrada = (dataAuto.code === 'Ok') ? dataAuto.routes[0] : null;
                let nacional = (dataNac.code === 'Ok') ? dataNac.routes[0] : null;

                // Se o servidor não suportar 'exclude=motorway' ou devolver rota idêntica, assinala como indisponível
                if (nacional && autoestrada && Math.abs(nacional.distance - autoestrada.distance) < 50) {
                    nacional = null;
                }

                const resultado = { autoestrada, nacional };
                rotasCache[id] = resultado;
                renderRotaResultado(id, resultado);
            } catch (err) {
                const container = document.getElementById(`viagem-resultado-${id}`);
                if (container) {
                    container.innerHTML = `
                        <div class="text-red-400 text-[11px] py-1">
                            <i class="fa-solid fa-triangle-exclamation"></i> Não foi possível calcular a rota (sem ligação ao servidor OSRM).
                        </div>`;
                }
            }
        }

        function formatarDistancia(metros) {
            return (metros / 1000).toFixed(0) + ' km';
        }
        function formatarDuracao(segundos) {
            const horas = Math.floor(segundos / 3600);
            const minutos = Math.round((segundos % 3600) / 60);
            return horas > 0 ? `${horas}h ${minutos}min` : `${minutos}min`;
        }

        function renderRotaResultado(id, { autoestrada, nacional }) {
            const container = document.getElementById(`viagem-resultado-${id}`);
            if (!container) return;

            if (!autoestrada) {
                container.innerHTML = `<div class="text-red-400 text-[11px] py-1">Rota não encontrada via OSRM.</div>`;
                return;
            }

            container.innerHTML = `
                <table class="viagem-table">
                    <thead>
                        <tr><th>Opção</th><th>Distância</th><th>Tempo</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><i class="fa-solid fa-road text-[#1DB954]"></i> Autoestrada</td>
                            <td>${formatarDistancia(autoestrada.distance)}</td>
                            <td>${formatarDuracao(autoestrada.duration)}</td>
                        </tr>
                        <tr>
                            <td><i class="fa-solid fa-signs-post text-amber-400"></i> Est. Nacionais</td>
                            <td>${nacional ? formatarDistancia(nacional.distance) : '—'}</td>
                            <td>${nacional ? formatarDuracao(nacional.duration) : '—'}</td>
                        </tr>
                    </tbody>
                </table>
                <p class="text-[9px] text-zinc-600 mt-1">Rotas calculadas via OSRM (Open Source Routing Machine).</p>
            `;
        }

        function renderListCards(data) {
            const container = document.getElementById('festival-list-container');

            if (data.length === 0) {

                        <span class="flex items-center gap-1 font-medium text-white/80"><i class="fa-regular fa-calendar text-[#1DB954]"></i> ${formatarDataDupla(fest.dataInicio, fest.dataFim)}</span>
                        <i class="fa-solid fa-chevron-right text-zinc-600 group-hover:text-[#1DB954] transition-colors transform group-hover:translate-x-1"></i>
                    </div>
                `;

                card.addEventListener('click', () => abrirFestivalSheet(fest));
                container.appendChild(card);
            });
